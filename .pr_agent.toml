[config]
model = "gemini/gemini-3.5-flash"
fallback_models = ["gemini/gemini-3.1-flash-lite"]
custom_model_max_tokens = 131072

[github_action_config]
auto_review = true
auto_describe = true
auto_improve = true
pr_actions = ["opened", "reopened", "ready_for_review"]

[pr_reviewer]
num_max_findings = 10
require_tests_review = true
require_security_review = true

[pr_description]
publish_description_as_comment = "persistent"
