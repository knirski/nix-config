# Basename must be exactly "pr-agent.yml" to exercise
# JOB_WRITE_ALLOWLIST["pr-agent.yml"], which allows only issues: write and
# pull-requests: write. Proves the allowlist is exact, not a blanket "any
# write is fine for this filename" -- contents: write must still be
# rejected here.
name: Fixture PR Agent
on:
  pull_request:
    types: [opened, reopened, ready_for_review]
permissions:
  contents: read
jobs:
  pr-agent:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1
