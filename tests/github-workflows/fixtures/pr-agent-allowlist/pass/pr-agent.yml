# Basename must be exactly "pr-agent.yml" to exercise
# JOB_WRITE_ALLOWLIST["pr-agent.yml"] in check_workflows.py. Proves the
# minimal permissions this repo's real pr-agent.yml declares pass cleanly.
name: Fixture PR Agent
on:
  pull_request:
    types: [opened, reopened, ready_for_review]
permissions:
  contents: read
jobs:
  pr-agent:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: "actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5" # v4.3.1
