# AI-powered PR review using Qodo's PR Agent (Gemini backend).
# Runs on every new PR and when a draft is marked ready for review.
#
# Requires the `GEMINI_API_KEY` repository secret (Google AI Studio).
# Set it via: https://github.com/knirski/nix-config/settings/secrets/actions
name: PR Agent

on:
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pr-agent-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  pr-agent:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      issues: write
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Validate Gemini API key secret
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::GEMINI_API_KEY repository secret is required for PR Agent."
            exit 1
          fi

      - name: PR Agent action step
        uses: the-pr-agent/pr-agent@8e4d32e5497defd43c023a404f73560c62728961 # v0.39.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_AI_STUDIO.GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CONFIG.MODEL: gemini/gemini-3.5-flash
          GITHUB_ACTION_CONFIG.AUTO_REVIEW: true
          GITHUB_ACTION_CONFIG.AUTO_DESCRIBE: true
          GITHUB_ACTION_CONFIG.AUTO_IMPROVE: true
          PR_DESCRIPTION.PUBLISH_DESCRIPTION_AS_COMMENT: persistent
