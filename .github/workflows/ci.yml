# CI validates reviewable source, both host closures, and the complete strict-
# KVM flake suite. Determinate's installer enables KVM on the selected hosted
# runner; the resilience job fails closed if /dev/kvm is unavailable.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Fast lane: runs on every PR including taste-only changes.
  # Heavy downstream jobs gate on non-taste changes via dorny/paths-filter.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      non-taste: ${{ steps.filter.outputs.non-taste }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v3
        id: filter
        with:
          filters: |
            non-taste:
              - '**/*'
              - '!.commandcode/taste/**'

  static:
    name: Static and repository policy
    if: needs.changes.outputs.non-taste == 'true'
    needs: [changes]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 2
      - uses: ./.github/actions/setup-nix
      - name: Build static and repository-policy checks
        run: |
          nix build --no-link \
            .#checks.x86_64-linux.pre-commit \
            .#checks.x86_64-linux.docs-correctness \
            .#checks.x86_64-linux.fmt-scope-contract \
            .#checks.x86_64-linux.formatting \
            .#checks.x86_64-linux.github-workflow-policy \
            .#checks.x86_64-linux.kvm-gate-drift \
            .#checks.x86_64-linux.public-repository-data \
            .#checks.x86_64-linux.script-contracts \
            .#checks.x86_64-linux.shell-boundaries \
            .#checks.x86_64-linux.topology-freshness
      - name: Scan current source for credentials
        run: nix run .#gitleaks -- detect --source . --no-git --redact --verbose
      - name: Check command-code override review freshness
        # Deliberately a plain script, not a `checks.*` derivation: see
        # tests/security/check_command_code_freshness.py's docstring for why
        # a cached Nix check would silently stop re-evaluating staleness.
        run: |
          python3 tests/security/check_command_code_freshness.py \
            modules/_pkgs/command-code-lock/last-reviewed.json

  evaluation:
    name: Evaluation and pure invariants
    if: needs.changes.outputs.non-taste == 'true'
    needs: [changes]
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 2
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && secrets.CACHIX_AUTH_TOKEN || '' }}
      - name: Materialize tracked agenix-rekey inputs
        run: |
          nix store add-path --name soyo ./secrets/rekeyed/soyo
          nix store add-path --name zbook ./secrets/rekeyed/zbook
      - name: Evaluate every flake output without building VMs
        run: nix flake check --no-build --show-trace
      - name: Evaluate project-owned pure outputs without IFD
        run: |
          nix eval --raw \
            .#checks.x86_64-linux.dashboard-renderer.drvPath \
            --option allow-import-from-derivation false
          nix eval --raw \
            .#packages.x86_64-linux.topology-public-overview.drvPath \
            --option allow-import-from-derivation false
      - name: Build pure invariants and software integration
        run: |
          nix build --no-link \
            .#checks.x86_64-linux.backup-restic-integration \
            .#checks.x86_64-linux.boot-generation-invariants \
            .#checks.x86_64-linux.btrfs-alert-metric-contract \
            .#checks.x86_64-linux.command-code-security \
            .#checks.x86_64-linux.dashboard-renderer \
            .#checks.x86_64-linux.dendritic-options \
            .#checks.x86_64-linux.deploy-activate \
            .#checks.x86_64-linux.deploy-schema \
            .#checks.x86_64-linux.dns-dhcp-config \
            .#checks.x86_64-linux.failure-notification-invariants \
            .#checks.x86_64-linux.home-manager-channel-invariants \
            .#checks.x86_64-linux.host-role-invariants \
            .#checks.x86_64-linux.impermanence-missing-early-persist \
            .#checks.x86_64-linux.initrd-recovery-invariants \
            .#checks.x86_64-linux.lan-inventory \
            .#checks.x86_64-linux.macbook-desktop-invariants \
            .#checks.x86_64-linux.maintenance-paths \
            .#checks.x86_64-linux.nixpkgs-policy-invariants \
            .#checks.x86_64-linux.persistence-invariants \
            .#checks.x86_64-linux.reservation-validation \
            .#checks.x86_64-linux.service-aspect-invariants \
            .#checks.x86_64-linux.soyo-guest-isolation \
            .#checks.x86_64-linux.systemd-hardening-invariants \
            .#checks.x86_64-linux.ubuntu-desktop-invariants
      - name: Push evaluation artifacts to Cachix
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          nix copy --to 'https://knirski-nix-config.cachix.org' \
            .#checks.x86_64-linux.backup-restic-integration \
            .#checks.x86_64-linux.boot-generation-invariants \
            .#checks.x86_64-linux.btrfs-alert-metric-contract \
            .#checks.x86_64-linux.command-code-security \
            .#checks.x86_64-linux.dashboard-renderer \
            .#checks.x86_64-linux.dendritic-options \
            .#checks.x86_64-linux.deploy-activate \
            .#checks.x86_64-linux.deploy-schema \
            .#checks.x86_64-linux.dns-dhcp-config \
            .#checks.x86_64-linux.failure-notification-invariants \
            .#checks.x86_64-linux.home-manager-channel-invariants \
            .#checks.x86_64-linux.host-role-invariants \
            .#checks.x86_64-linux.impermanence-missing-early-persist \
            .#checks.x86_64-linux.initrd-recovery-invariants \
            .#checks.x86_64-linux.lan-inventory \
            .#checks.x86_64-linux.macbook-desktop-invariants \
            .#checks.x86_64-linux.maintenance-paths \
            .#checks.x86_64-linux.nixpkgs-policy-invariants \
            .#checks.x86_64-linux.persistence-invariants \
            .#checks.x86_64-linux.reservation-validation \
            .#checks.x86_64-linux.service-aspect-invariants \
            .#checks.x86_64-linux.soyo-guest-isolation \
            .#checks.x86_64-linux.systemd-hardening-invariants \
            .#checks.x86_64-linux.ubuntu-desktop-invariants

  build:
    name: Build ${{ matrix.host }} closure
    if: needs.changes.outputs.non-taste == 'true'
    needs: [evaluation, changes]
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        host: [soyo, zbook]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 2
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && secrets.CACHIX_AUTH_TOKEN || '' }}
      - run: nix store gc
      - name: Build complete system closure
        run: |
          nix build \
            .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel \
            --keep-going --no-link --print-out-paths

  build-ubuntu:
    name: Build ubuntu HM activation package
    if: needs.changes.outputs.non-taste == 'true'
    needs: [evaluation, changes]
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 2
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && secrets.CACHIX_AUTH_TOKEN || '' }}
      - run: nix store gc
      - name: Build Home Manager activation package
        run: |
          nix build \
            .#homeConfigurations.ubuntu.activationPackage \
            --keep-going --no-link --print-out-paths

  build-macbook:
    name: Build macbook darwin closure
    # macbook requires aarch64-darwin, which can only be evaluated on macOS.
    if: needs.changes.outputs.non-taste == 'true'
    needs: [evaluation, changes]
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 2
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && secrets.CACHIX_AUTH_TOKEN || '' }}
      - run: nix store gc
      - name: Build complete darwin closure
        run: |
          nix build \
            .#darwinConfigurations.macbook.config.system.build.toplevel \
            --keep-going --no-link --print-out-paths

  resilience:
    name: Strict KVM behavior tests
    if: needs.changes.outputs.non-taste == 'true'
    needs: [evaluation, changes]
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 2
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && secrets.CACHIX_AUTH_TOKEN || '' }}
      - name: Require hardware virtualization
        run: test -c /dev/kvm && test -r /dev/kvm && test -w /dev/kvm
      - name: Run strict KVM behavior checks
        run: |
          nix build --no-link --keep-going \
            .#checks.x86_64-linux.backup-unit-vm \
            .#checks.x86_64-linux.dns-dhcp-vm \
            .#checks.x86_64-linux.impermanence-vm \
            .#checks.x86_64-linux.clipboard-protocols

  topology:
    name: Publish sanitized topology
    if: needs.changes.outputs.non-taste == 'true'
    needs: [evaluation, changes]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 2
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') && secrets.CACHIX_AUTH_TOKEN || '' }}
      - name: Build sanitized topology overview
        run: |
          topology=$(nix build .#topology-public-overview --no-link --print-out-paths)
          mkdir -p topology-output
          cp "$topology/overview.svg" topology-output/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: topology
          path: topology-output/
          retention-days: 7
