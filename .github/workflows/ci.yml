# CI: lint, eval, build, and topology check on every push.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-flakehub: false
      - uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        if: github.ref_name == 'main'
        with:
          name: knirski-nix-config
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - run: nix run .#deadnix -- .
      - run: nix run nixpkgs#statix -- check .
      - run: nix run nixpkgs#typos -- .
      - run: nix run nixpkgs#actionlint -- .github/workflows/*.yml
      - run: nix run nixpkgs#shellcheck -- scripts/healthcheck.sh
      - run: >-
          nix run nixpkgs#markdownlint-cli --
          --disable MD013 MD033 MD060 MD029 MD031 MD032
          --ignore .commandcode '*.md' 'docs/**/*.md'
      - run: nix run nixpkgs#ruff -- check modules/nixos/observability/lan_inventory.py modules/nixos/observability/lan_inventory_test.py
      - run: nix run nixpkgs#gitleaks -- detect --source . --no-git --verbose

  eval:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-flakehub: false
      - uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        if: github.ref_name == 'main'
        with:
          name: knirski-nix-config
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - run: nix store gc
      # Hosted runners do not guarantee /dev/kvm. The final CI stack builds
      # every pure check explicitly; strict KVM tests remain a local gate.
      - run: nix flake check --no-build --show-trace

  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        host: [soyo, zbook]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-flakehub: false
      - uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        if: github.ref_name == 'main'
        with:
          name: knirski-nix-config
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - run: nix store gc  # free runner disk space before the build
      - run: >
          nix build .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel
          --keep-going

      - name: Restore previous closure path
        id: closure-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: previous-closure.txt
          key: closure-${{ matrix.host }}-${{ github.base_ref || github.ref_name }}

      - name: Compare closures
        if: steps.closure-cache.outputs.cache-hit == 'true'
        run: |
          PREV=$(cat previous-closure.txt)
          CURR=$(readlink -f result)
          if nix path-info "$PREV" &>/dev/null; then
            echo "### Closure diff for ${{ matrix.host }}" >> "$GITHUB_STEP_SUMMARY"
            nix store diff-closures "$PREV" "$CURR" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Previous closure not available in store; skipping diff." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Save current closure path
        run: readlink -f result > previous-closure.txt

  topology:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-flakehub: false
      - uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        if: github.ref_name == 'main'
        with:
          name: knirski-nix-config
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - run: nix build .#topology
      - run: mkdir -p topology-output && cp result/*.svg topology-output/
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: topology
          path: topology-output/
